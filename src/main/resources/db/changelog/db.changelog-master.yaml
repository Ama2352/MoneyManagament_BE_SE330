databaseChangeLog:
  - changeSet:
      id: 1
      author: yourname
      changes:
        - createTable:
            tableName: roles
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: first_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_role
                    references: roles(id)
        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: token
                  type: VARCHAR(512)
                  constraints:
                    nullable: false
              - column:
                  name: jwt_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: creation_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: expiry_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: invalidated
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user
                    references: users(id)
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user
                    references: users(id)
        - createIndex:
            indexName: ix_category_name
            tableName: categories
            columns:
              - column:
                  name: name
        - createIndex:
            indexName: ix_category_userid
            tableName: categories
            columns:
              - column:
                  name: user_id
        - createTable:
            tableName: wallets
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: wallet_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: balance
                  type: NUMERIC(20,4)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user
                    references: users(id)
        - createIndex:
            indexName: ix_wallet_walletname
            tableName: wallets
            columns:
              - column:
                  name: wallet_name
        - createIndex:
            indexName: ix_wallet_userid
            tableName: wallets
            columns:
              - column:
                  name: user_id
        - createTable:
            tableName: transactions
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: amount
                  type: NUMERIC(20,4)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(255)
              - column:
                  name: transaction_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: wallet_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_wallet
                    references: wallets(id)
              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_category
                    references: categories(id)
        - createIndex:
            indexName: ix_transaction_walletid
            tableName: transactions
            columns:
              - column:
                  name: wallet_id
        - createIndex:
            indexName: ix_transaction_categoryid
            tableName: transactions
            columns:
              - column:
                  name: category_id
        - createIndex:
            indexName: ix_transaction_transactiondate
            tableName: transactions
            columns:
              - column:
                  name: transaction_date
        - createIndex:
            indexName: ix_transaction_type
            tableName: transactions
            columns:
              - column:
                  name: type
        - createTable:
            tableName: messages
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: sender_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_sender
                    references: users(id)
              - column:
                  name: receiver_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_receiver
                    references: users(id)
              - column:
                  name: content
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: sent_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
  - changeSet:
      id: 2
      author: yourname
      changes:
        - sql:
            sql: |
              INSERT INTO roles (name) VALUES ('USER');
              INSERT INTO roles (name) VALUES ('ADMIN');